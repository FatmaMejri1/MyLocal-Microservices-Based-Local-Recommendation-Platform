name: MyLocal CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKERHUB_USERNAME: fatma111

jobs:
  # ================================
  # TEST JOBS (Parallel)
  # ================================
  test-backend:
    name: Test ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: 'Gateway', dir: '.' }
          - { name: 'User Service', dir: './user-service' }
          - { name: 'Content Service', dir: './content-service' }
          - { name: 'Media Service', dir: './media-service' }

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, intl, zip

      - name: Install dependencies
        run: composer install --no-interaction --no-progress
        working-directory: ${{ matrix.service.dir }}

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies and Build
        run: npm install && npm run build
        working-directory: ./mylocal-frontend

  # ================================
  # BUILD & PUSH JOBS (Parallel)
  # ================================
  build-push-backend:
    name: Build & Push ${{ matrix.service.image }}
    runs-on: ubuntu-latest
    needs: test-backend
    strategy:
      fail-fast: false
      matrix:
        service:
          - { image: 'mylocal-gateway', context: '.', dockerfile: 'Dockerfile' }
          - { image: 'mylocal-user-service', context: './user-service', dockerfile: './user-service/Dockerfile' }
          - { image: 'mylocal-content-service', context: './content-service', dockerfile: './content-service/Dockerfile' }
          - { image: 'mylocal-media-service', context: './media-service', dockerfile: './media-service/Dockerfile' }

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          dockerfile: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}

  build-push-frontend:
    name: Build & Push mylocal-frontend
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./mylocal-frontend
          dockerfile: ./mylocal-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/mylocal-frontend:latest
            ${{ env.DOCKERHUB_USERNAME }}/mylocal-frontend:${{ github.sha }}

  # ================================
  # GITOPS JOB (Updates K8s manifests)
  # ================================
  update-manifests:
    name: Update K8s Manifests for ArgoCD
    runs-on: ubuntu-latest
    needs: [build-push-backend, build-push-frontend]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Image Tags
        run: |
          sed -i "s|image: fatma111/mylocal-gateway:.*|image: fatma111/mylocal-gateway:${{ github.sha }}|g" k8s/gateway.yaml
          sed -i "s|image: fatma111/mylocal-user-service:.*|image: fatma111/mylocal-user-service:${{ github.sha }}|g" k8s/user-service.yaml
          sed -i "s|image: fatma111/mylocal-content-service:.*|image: fatma111/mylocal-content-service:${{ github.sha }}|g" k8s/content-service.yaml
          sed -i "s|image: fatma111/mylocal-media-service:.*|image: fatma111/mylocal-media-service:${{ github.sha }}|g" k8s/media-service.yaml
          sed -i "s|image: fatma111/mylocal-frontend:.*|image: fatma111/mylocal-frontend:${{ github.sha }}|g" k8s/frontend.yaml

      - name: Commit and Push to Trigger ArgoCD
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/*.yaml
          git commit -m "chore(gitops): update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push origin main
