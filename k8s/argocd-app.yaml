apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mylocal
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FatmaMejri1/MyLocal-Microservices-Based-Local-Recommendation-Platform.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: mylocal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
