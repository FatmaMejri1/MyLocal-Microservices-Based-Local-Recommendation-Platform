apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: mylocal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: fatma111/mylocal-gateway:d1bec81fe74c93428d5cc873b55b2ddb03635b79
        ports:
        - containerPort: 80
        env:
        - name: APP_ENV
          value: "dev"
        - name: APP_SECRET
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: APP_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: mylocal
spec:
  selector:
    app: gateway
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30000
  type: NodePort
