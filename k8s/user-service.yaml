apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: mylocal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: fatma111/mylocal-user-service:latest
        ports:
        - containerPort: 80
        env:
        - name: DATABASE_URL
          value: "postgresql://app:!ChangeMe!@user-database:5432/app"
        - name: APP_SECRET
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: mylocal
spec:
  selector:
    app: user-service
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30001
  type: NodePort
