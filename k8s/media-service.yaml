apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: mylocal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
    spec:
      containers:
      - name: media-service
        image: fatma111/mylocal-media-service:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: media-service
  namespace: mylocal
spec:
  selector:
    app: media-service
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30003
  type: NodePort
