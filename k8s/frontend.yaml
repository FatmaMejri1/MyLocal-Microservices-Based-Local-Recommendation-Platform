apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mylocal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: fatma111/mylocal-frontend:c4645bee2ec53aee69c082fb896bd3cd4653d683
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: mylocal
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30004
  type: NodePort
